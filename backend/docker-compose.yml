services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitreview
      POSTGRES_USER: gitreview
      POSTGRES_PASSWORD: gitreview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitreview"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
